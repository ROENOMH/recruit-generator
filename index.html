<!DOCTYPE html>
<html lang="ko">
<head>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css">

<body>
    <div id="root"></div>
    <script type="text/babel">
    const { useState, useRef, useEffect, Fragment } = React;

    // URL을 base64로 변환
    async function urlToBase64(url) {
        try {
            const res = await fetch(url);
            const blob = await res.blob();
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        } catch(e) { return url; }
    }

    // 페이지의 모든 @font-face를 수집해 base64로 변환한 CSS 반환
    async function getFontsAsBase64CSS() {
        const fontFaces = [];
        for (const sheet of Array.from(document.styleSheets)) {
            try {
                const rules = Array.from(sheet.cssRules || []);
                for (const rule of rules) {
                    if (rule instanceof CSSFontFaceRule) {
                        fontFaces.push(rule.cssText);
                    }
                }
            } catch(e) {}
        }
        // 실제 로드된 FontFace API 사용
        const loadedFonts = Array.from(document.fonts);
        const cssParts = [];
        for (const font of loadedFonts) {
            try {
                await font.load();
            } catch(e) {}
        }
        // stylesheet에서 woff2 URL 추출하여 base64로 변환
        const processedCSS = [];
        for (const sheet of Array.from(document.styleSheets)) {
            try {
                const rules = Array.from(sheet.cssRules || []);
                for (const rule of rules) {
                    if (rule instanceof CSSFontFaceRule) {
                        let cssText = rule.cssText;
                        const urlMatches = cssText.match(/url\(["']?([^"')]+)["']?\)/g) || [];
                        for (const urlMatch of urlMatches) {
                            const rawUrl = urlMatch.replace(/url\(["']?/, '').replace(/["']?\)$/, '');
                            if (rawUrl.startsWith('data:')) continue;
                            const absoluteUrl = new URL(rawUrl, sheet.href || location.href).href;
                            try {
                                const b64 = await urlToBase64(absoluteUrl);
                                cssText = cssText.replace(urlMatch, `url("${b64}")`);
                            } catch(e) {}
                        }
                        processedCSS.push(cssText);
                    }
                }
            } catch(e) {}
        }
        return processedCSS.join('\n');
    }

    const Icon = ({ name, className }) => {
        const icons = {
            Download: <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5 5 5-5m-5 5V3"/></svg>,
            PlusCircle: <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8m-4-4h8"/></svg>,
            Layout: <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M3 9h18m-9-6v18"/></svg>,
            ChevronRight: <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>,
            X: <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>,
            GripVertical: <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>,
            Loader2: <svg className={`${className} animate-spin`} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        };
        return icons[name] || null;
    };

    const EditableText = ({ value, onSave, className, multiline = false }) => {
        const [isEditing, setIsEditing] = useState(false);
        const [localValue, setLocalValue] = useState(value);
        const inputRef = useRef(null);
        useEffect(() => { setLocalValue(value); }, [value]);
        const handleBlur = () => { setIsEditing(false); if (localValue !== value) onSave(localValue); };
        const handleKeyDown = (e) => { if (e.key === 'Enter' && !multiline) { e.preventDefault(); inputRef.current.blur(); } };
        if (isEditing) {
            return multiline
                ? <textarea ref={inputRef} className={`w-full p-1 bg-blue-50 text-gray-800 outline-none border border-blue-400 rounded ${className}`} value={localValue} onChange={(e) => setLocalValue(e.target.value)} onBlur={handleBlur} autoFocus />
                : <input ref={inputRef} className={`w-full p-1 bg-blue-50 text-inherit outline-none border border-blue-400 rounded ${className}`} value={localValue} onChange={(e) => setLocalValue(e.target.value)} onBlur={handleBlur} onKeyDown={handleKeyDown} autoFocus />;
        }
        return <div onClick={() => setIsEditing(true)} className={`editable-preview transition-all px-1 -mx-1 min-h-[1.2em] min-w-[20px] ${className}`}>{value || <span className="text-gray-300 italic">(비어있음)</span>}</div>;
    };

    // 이모지 피커 컴포넌트
    const EMOJI_CATEGORIES = [
        { label: '🌟 자주 쓰는', emojis: ['☕','🧋','🍦','🥗','🍱','🎂','🎁','💐','🏆','⭐','✨','🎉'] },
        { label: '💼 복지/혜택', emojis: ['📘','📓','📅','💸','📈','📊','🛋️','🤱','😁','💪','🧘','🏃'] },
        { label: '🏢 회사생활', emojis: ['💻','🖥️','📱','🖨️','📞','📋','📌','📎','🗂️','🗃️','📂','🗄️'] },
        { label: '❤️ 감사/지원', emojis: ['🎓','🏥','🚗','✈️','🏠','💊','👶','🐶','🎮','🎵','🎨','📷'] },
        { label: '💰 금전/보험', emojis: ['💰','💵','💴','💳','🏦','💎','🪙','💹','📉','📈','🤝','🔑'] },
    ];

    const EmojiPicker = ({ onSelect }) => {
        const [open, setOpen] = useState(false);
        const [activeTab, setActiveTab] = useState(0);
        const ref = useRef(null);

        useEffect(() => {
            const handleClick = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
            document.addEventListener('mousedown', handleClick);
            return () => document.removeEventListener('mousedown', handleClick);
        }, []);

        return (
            <div className="relative" ref={ref}>
                <button type="button" onClick={() => setOpen(o => !o)}
                    className="w-10 h-10 flex items-center justify-center text-xl rounded-lg border border-gray-200 bg-white hover:bg-gray-50 hover:border-[#00238D] transition-all shadow-sm"
                    title="이모지 선택">
                    😊
                </button>
                {open && (
                    <div className="absolute bottom-12 left-0 z-50 bg-white border border-gray-200 rounded-xl shadow-2xl w-72 overflow-hidden">
                        <div className="flex border-b border-gray-100 overflow-x-auto">
                            {EMOJI_CATEGORIES.map((cat, i) => (
                                <button key={i} onClick={() => setActiveTab(i)}
                                    className={`px-3 py-2 text-xs whitespace-nowrap transition-all ${activeTab === i ? 'bg-[#00238D] text-white font-bold' : 'text-gray-500 hover:bg-gray-50'}`}>
                                    {cat.label}
                                </button>
                            ))}
                        </div>
                        <div className="grid grid-cols-6 gap-1 p-3">
                            {EMOJI_CATEGORIES[activeTab].emojis.map((emoji, i) => (
                                <button key={i} onClick={() => { onSelect(emoji); setOpen(false); }}
                                    className="w-10 h-10 flex items-center justify-center text-2xl rounded-lg hover:bg-gray-100 transition-all"
                                    title={emoji}>
                                    {emoji}
                                </button>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );
    };

    const DraggableListInput = ({ items, onChange, placeholder, isAiLoading, showEmojiPicker = false }) => {
        const [inputValue, setInputValue] = useState('');
        const [draggedIdx, setDraggedIdx] = useState(null);
        const [editingIdx, setEditingIdx] = useState(null);
        const [editValue, setEditValue] = useState('');
        const inputRef = useRef(null);
        const handleKeyDown = (e) => { if (e.key === 'Enter' && inputValue.trim() !== '') { e.preventDefault(); onChange([...items, inputValue.trim()]); setInputValue(''); } };
        const handleDragStart = (e, idx) => { setDraggedIdx(idx); e.dataTransfer.effectAllowed = 'move'; };
        const handleDragEnter = (idx) => {
            if (draggedIdx === null || draggedIdx === idx) return;
            const newItems = [...items]; const draggedItem = newItems[draggedIdx];
            newItems.splice(draggedIdx, 1); newItems.splice(idx, 0, draggedItem);
            setDraggedIdx(idx); onChange(newItems);
        };
        const handleEmojiSelect = (emoji) => {
            setInputValue(prev => emoji + ' ' + prev);
            if (inputRef.current) inputRef.current.focus();
        };
        return (
            <div className="w-full flex flex-col gap-2 relative">
                {items.map((item, idx) => (
                    <div key={idx} draggable={editingIdx !== idx} onDragStart={(e) => handleDragStart(e, idx)} onDragEnter={() => handleDragEnter(idx)} onDragOver={(e) => e.preventDefault()} onDragEnd={() => setDraggedIdx(null)} className={`group flex items-center justify-between bg-white border rounded-lg p-2 transition-all select-none ${editingIdx === idx ? 'border-blue-500 ring-4 ring-blue-100' : 'border-gray-200 cursor-grab hover:border-blue-400'}`}>
                        <div className="flex items-center gap-2 flex-1 overflow-hidden">
                            <Icon name="GripVertical" className={`w-4 h-4 shrink-0 ${draggedIdx === idx ? 'text-[#00238D]' : 'text-gray-400'}`} />
                            {editingIdx === idx
                                ? <input type="text" value={editValue} onChange={(e) => setEditValue(e.target.value)} onBlur={() => { if(editValue.trim()) { const n=[...items]; n[idx]=editValue; onChange(n); } setEditingIdx(null); }} onKeyDown={(e) => e.key === 'Enter' && e.target.blur()} autoFocus className="flex-1 w-full px-2 py-0.5 text-sm font-medium border-b-2 border-[#00238D] outline-none" />
                                : <span onDoubleClick={() => { setEditingIdx(idx); setEditValue(item); }} className="text-sm font-medium text-gray-700 flex-1 truncate cursor-text py-0.5">{item}</span>
                            }
                        </div>
                        <button onClick={() => onChange(items.filter((_, i) => i !== idx))} className="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="X" className="w-4 h-4" /></button>
                    </div>
                ))}
                <div className="relative flex gap-2 items-center">
                    {showEmojiPicker && <EmojiPicker onSelect={handleEmojiSelect} />}
                    <input ref={inputRef} type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} onKeyDown={handleKeyDown} placeholder={isAiLoading ? "생성 중..." : placeholder} disabled={isAiLoading} className="flex-1 p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-4 focus:ring-[#00238D]/10 outline-none text-sm transition-all shadow-inner" />
                    {isAiLoading && <Icon name="Loader2" className="absolute right-3 top-3 w-4 h-4 text-[#00238D]" />}
                </div>
            </div>
        );
    };

    const IMG_RECRUIT = 'https://raw.githubusercontent.com/ROENOMH/image-hosting/main/roen-surgical-recruit.png';
    const IMG_CULTURE = 'https://raw.githubusercontent.com/ROENOMH/image-hosting/main/roen-surgical-culture.png';

    function App() {
        const exportRef = useRef(null);
        const [isGenerating, setIsGenerating] = useState(false);
        const [recruitImgSrc, setRecruitImgSrc] = useState(IMG_RECRUIT);
        const [cultureImgSrc, setCultureImgSrc] = useState(IMG_CULTURE);
        const [formData, setFormData] = useState({
            recruitmentYear: '2026', jobCategory: 'Full Stack (프론트/백엔드) 개발자', experienceLevel: '(경력/신입)',
            department: 'IT전략 (플랫폼 개발팀)', education: '무관 (졸업예정자 가능)', major: '컴퓨터공학 관련',
            companyUrl: 'https://www.roensurgical.com',
            responsibilities: ['신규 서비스 기획 및 프론트엔드/백엔드 개발', '신규/기존 서비스 웹퍼블리싱(퍼블리셔 협업)', '외부 API 연동', '코드 리뷰'],
            qualifications: ['React, Vue 등 SPA 프레임워크 유경험자', 'Node.js/Spring Boot 등 백엔드 개발 유경험자', 'RDBMS 활용 및 SQL 작성 가능자'],
            preferred: ['AWS, GCP 등 클라우드 서비스 경험자', '배포 자동화 (CI/CD) 구축/운영 경험자'],
            employmentType: ['정규직 (수습기간 3개월, 급여 100% 지급)', '주 5일(월~금) / 유연근무제 운영', '4대 보험 적용'],
            benefits: ['🧋 음료(차, 커피) 제공','🍦 맞춤 간식 제공','🥗 점심 식권 제공','📘 교육 지원','📓 사무용품 제공','📈 스톡옵션','📊 우리사주제도 운영','😁 유연근무제','🛋️ 경조휴가','🤱 육아휴직','📅 자유로운 연/반차','💸 퇴직 연금','💐 경조사 지원','🎂 생일 선물 제공'],
            processSteps: ['서류전형', '1차 면접', '2차 면접', '입사'],
            processInfo: ['접수 기간 : 채용시~2026-12-31', '문의 및 접수 방법 : 042-867-1231, hr@roensurgical.com', '이력서 양식 : 사람인 이력서 제출 (자기소개서와 경력 기술서 필수)'],
            notices: ['서류 합격자에 한하여 전형이 진행됩니다.', '최종합격 시, 합격자에게만 개별 통보 문자가 전달됩니다.', '이력서에 기재된 학력 및 경력사항 등 기재 사항이 허위임이 판명될 경우, 합격이 취소 될 수 있습니다.']
        });

        const handleDownload = () => {
            // 사람인 HTML 에디터용 인라인 스타일 HTML 생성
            const html = generateSaraminHTML(formData);
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const link = document.createElement('a');
            link.download = `채용공고_${formData.jobCategory}.html`;
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
        };

        const generateSaraminHTML = (data) => {
            const blue = '#00238D';
            const darkBg = '#0F1B3A';
            const steps = data.processSteps;

            const tableRow = (label, content) => `
<tr>
  <td style="width:160px;padding:20px 16px;font-weight:900;color:${blue};font-size:16px;background:#f8f9fa;border-bottom:1px solid #dee2e6;vertical-align:middle;text-align:center;">${label}</td>
  <td style="padding:20px 16px;color:#333;font-size:15px;line-height:1.8;border-bottom:1px solid #dee2e6;vertical-align:middle;">${content}</td>
</tr>`;

            const bulletList = (items) => items.map(i => `<div style="margin:4px 0;">- ${i}</div>`).join('');

            const processHTML = steps.map((step, i) => {
                const isLast = i === steps.length - 1;
                const circle = `<div style="display:inline-flex;align-items:center;justify-content:center;width:150px;height:150px;border-radius:50%;border:2px solid ${isLast ? blue : '#ccc'};background:${isLast ? blue : '#fff'};color:${isLast ? '#fff' : '#555'};font-weight:700;font-size:17px;text-align:center;">${step}</div>`;
                const arrow = i < steps.length - 1 ? `<span style="margin:0 8px;color:#ccc;font-size:20px;">›</span>` : '';
                return circle + arrow;
            }).join('');

            const benefitsHTML = data.benefits.map(b => {
                const parts = b.trim().split(' ');
                const emoji = parts[0];
                const title = parts.slice(1).join(' ');
                return `<td style="width:20%;padding:16px 8px;text-align:center;vertical-align:top;">
  <div style="width:80px;height:80px;border-radius:20px;background:#000B2C;display:inline-flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:8px;">${emoji}</div>
  <div style="color:rgba(255,255,255,0.85);font-size:13px;line-height:1.4;">${title}</div>
</td>`;
            }).join('');

            // 5개씩 줄바꿈
            const benefitRows = [];
            for (let i = 0; i < data.benefits.length; i += 5) {
                const rowItems = data.benefits.slice(i, i + 5);
                const cells = rowItems.map(b => {
                    const parts = b.trim().split(' ');
                    const emoji = parts[0];
                    const title = parts.slice(1).join(' ');
                    return `<td style="width:20%;padding:16px 8px;text-align:center;vertical-align:top;"><div style="width:80px;height:80px;border-radius:20px;background:#000B2C;display:inline-flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:8px;">${emoji}</div><div style="color:rgba(255,255,255,0.85);font-size:13px;line-height:1.4;">${title}</div></td>`;
                }).join('');
                benefitRows.push(`<tr>${cells}</tr>`);
            }

            return `<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>채용공고</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"></head>
<body style="margin:0;padding:0;font-family:'Noto Sans KR',sans-serif;">

<!-- 헤더 이미지 + 텍스트 오버레이 -->
<div style="background:${blue};width:100%;">
  <div style="max-width:860px;margin:0 auto;position:relative;line-height:0;">
    <img src="https://raw.githubusercontent.com/ROENOMH/image-hosting/main/roen-surgical-recruit.png" style="width:100%;display:block;" />
    <div style="position:absolute;top:40px;left:40px;">
      <div style="font-size:56px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1;">${data.recruitmentYear}</div>
      <div style="font-size:48px;font-weight:900;color:#fff;letter-spacing:4px;line-height:1.1;margin-top:4px;">RECRUITMENT</div>
    </div>
  </div>
</div>

<!-- 직무 타이틀 -->
<div style="background:${blue};width:100%;">
  <div style="max-width:860px;margin:0 auto;padding:32px 40px;box-sizing:border-box;text-align:center;color:#fff;">
    <span style="font-size:26px;font-weight:700;">${data.jobCategory}</span>
    <span style="font-size:18px;font-weight:400;margin-left:8px;opacity:0.9;">${data.experienceLevel}</span>
  </div>
</div>

<!-- 상세 요건 테이블 -->
<div style="max-width:860px;margin:0 auto;padding:40px 40px;">
  <table style="width:100%;border-collapse:collapse;border-top:3px solid ${blue};border-bottom:3px solid ${blue};">
    ${tableRow('모집분야', data.department)}
    ${tableRow('주요업무', bulletList(data.responsibilities))}
    ${tableRow('자격요건', bulletList(data.qualifications))}
    ${data.preferred.length > 0 ? tableRow('우대사항', bulletList(data.preferred)) : ''}

<!-- 채용절차 -->

    ${processHTML}

  ${data.processInfo.map(i => `<div style="color:#555;font-size:15px;margin:8px 0;line-height:1.6;">• ${i}</div>`).join('')}
</div>

<!-- 유의사항 -->
<div style="max-width:860px;margin:0 auto;padding:0 40px 60px;">
  <div style="font-size:22px;font-weight:800;color:${blue};margin-bottom:20px;">유의사항</div>
  ${data.notices.map(n => `<div style="color:#555;font-size:15px;margin:8px 0;line-height:1.6;">• ${n}</div>`).join('')}
</div>

<!-- 구분선 -->
